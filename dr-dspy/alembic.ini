[alembic]
script_location = src/dr_dspy/db/migrations
prepend_sys_path = src
path_separator = os
# Fallback when DATABASE_URL is unset; env.py overrides from DATABASE_URL.
sqlalchemy.url = postgresql+psycopg:///dr_dspy

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
